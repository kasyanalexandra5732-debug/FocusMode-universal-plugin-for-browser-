<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h3>Focus Mode 🎯</h3>
    
    <div class="input-group">
      <input type="text" id="siteInput" placeholder="example.com">
      <button id="addBtn">Добавить</button>
    </div>

    <ul id="siteList"></ul>

    <hr>

    <div class="timer-settings">
      <input type="number" id="minutes" value="25" min="1" max="120">
      <span>мин.</span>
    </div>

    <div class="controls">
      <button id="startBtn">Фокус!</button>
      <button id="stopBtn" class="secondary">Стоп</button>
    </div>
    
    <div id="status">Статус: Свободен</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
